<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obchod s legem</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Obchod s legem</h1>
    </header>
    <main>
        <div class="obchod"><!--začátek obchodu-->

            <div class="polozka">
                <h3>Kočka</h3>
                <img src="assets/images.jpg" alt="Chleba">
                <p>Cena: <span id="cenakocka">300</span>,- Kč</p>
                <button onclick="koupit('cenakocka', 'kočka')">koupit</button>
            </div>

            <div class="polozka">
                <h3>Formule 1</h3>
                <img src="assets/f1.jpg" alt="Chleba">
                <p>Cena: <span id="cenaformule">700</span>,- Kč</p>
                <button onclick="koupit('cenaformule', 'formule 1')">koupit</button>
            </div>

            <div class="polozka">
                <h3>Homer</h3>
                <img src="assets/simpsons.webp" alt="Chleba">
                <p>Cena: <span id="cenahomer">450</span>,- Kč</p>
                <button onclick="koupit('cenahomer', 'Homer')">koupit</button>
            </div>

        </div><!--konec obchodu-->
        <div class="kosicek kosik"><!--začátek košíku-->
            <h2>Košík</h2>
            <p>Celková cena: <span id="cena_nakupu"></span></p>
            <button onclick="zaplatit()">Zaplatit</button>
            <h5>Co vše je v košíku:</h5>
            <p id="obsah_kosiku"></p>
        </div><!--konec košíku-->
    </main>
    <footer>
        <p>Made by: Jakub Todovič 2026</p>
    </footer>
</body>
<script src="script.js"></script>

</html>
